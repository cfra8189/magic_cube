<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGIC CUBE v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1>● MAGIC CUBE ●</h1>
            <div class="theme-toggle">
                <label class="switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider"></span>
                </label>
                <span class="theme-label">☀️ LIGHT</span>
            </div>
        </div>
        
        <div class="magic-cube" id="magicCube">
            <div class="ball-inner">
                <div class="cube-face" id="answerFace">
                    <span id="answerText">8</span>
                </div>
            </div>
        </div>
        
        <div class="input-section">
            <input type="text" id="nameInput" placeholder="YOUR NAME (OPTIONAL)" value="CLARENCE" maxlength="20">
            <input type="text" id="questionInput" placeholder="ASK YOUR QUESTION..." maxlength="50">
            <button id="shakeButton">[ SHAKE THE CUBE ]</button>
        </div>
        
        <div class="result" id="result">
            <p id="questionDisplay"></p>
            <p id="answerDisplay"></p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
